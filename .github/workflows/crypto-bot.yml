name: Krypto-Test-Trading-Bot

# Beobachtet den Kurs (SMA-Crossover, siehe strategy.py) und kauft/verkauft
# automatisch auf einem Bybit-Demo-Trading-Konto (virtuelles Geld, echte
# Marktpreise). Laeuft alle 15 Minuten passend zur Kerzengroesse.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  trade:
    runs-on: ubuntu-latest
    env:
      BYBIT_API_KEY: ${{ secrets.BYBIT_API_KEY }}
      BYBIT_API_SECRET: ${{ secrets.BYBIT_API_SECRET }}
      CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
      CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Merkt sich zwischen den Laeufen, ob der Bot aktuell "im Markt" ist.
      - name: Status-Cache wiederherstellen
        uses: actions/cache@v4
        with:
          path: state
          key: crypto-state-${{ github.run_id }}
          restore-keys: |
            crypto-state-

      - name: Abhaengigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Kurs pruefen und ggf. handeln
        run: python crypto_bot.py
