name: SPH Hausaufgaben-Check

# Laeuft rund um die Uhr alle 30 Minuten in der GitHub-Cloud (PC muss NICHT an
# sein). Dank Anti-Spam (Signatur) kommt eine WhatsApp nur, wenn sich wirklich
# etwas geaendert hat. Alle 30 Min haelt die kostenlosen GitHub-Minuten ein
# (ca. 2000/Monat); kuerzere Intervalle wuerden das Gratis-Budget sprengen.
# Hinweis: GitHub startet cron-Jobs manchmal 5-15 Min spaeter - das ist normal.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # erlaubt manuelles Starten per Knopfdruck

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      SPH_USERNAME: ${{ secrets.SPH_USERNAME }}
      SPH_PASSWORD: ${{ secrets.SPH_PASSWORD }}
      SPH_SCHOOL_ID: ${{ secrets.SPH_SCHOOL_ID }}
      CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
      CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Merkt sich zwischen den Laeufen, was schon gemeldet wurde (Anti-Spam).
      # "Rolling cache": stellt den letzten Stand wieder her, speichert neuen am Ende.
      - name: Status-Cache wiederherstellen
        uses: actions/cache@v4
        with:
          path: state
          key: sph-state-${{ github.run_id }}
          restore-keys: |
            sph-state-

      # Browser (Chromium) zwischen Laeufen zwischenspeichern -> spart pro Lauf
      # ~30s Download und damit kostenlose GitHub-Minuten.
      - name: Playwright-Browser-Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-1.49.0

      - name: Abhaengigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Mein Unterricht auslesen
        run: python offene_aufgaben.py --headless

      - name: WhatsApp-Benachrichtigung bei offenen Aufgaben
        run: python notify.py

      - name: KI-Tutor (Groq) erklaert offene Hausaufgaben (loest nicht)
        run: python tutor.py
